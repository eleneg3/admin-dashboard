<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div id="container">
        <div id="header">
            <div class="upper-header">
                <div class="search-container">
                    <img src="./icons/magnify.svg" alt="magnifying-glass-icon" class="header-button-icon">
                    <input type="search" name="search" id="main-search">
                </div>
                <div class="header-right-buttons-container">
                    <button type="button" class="header-button" id="notifications" >
                        <img src="./icons/bell-badge-outline.svg" alt="notifications-icon" class="header-button-icon">
                    </button>
                    <button type="button" class="header-button" id="user-menu" aria-label="Delete item">
                        <img src="./icons/profile-icon-8164738-512.png" alt="profile-pic-icon" class="header-button-icon">
                    </button>
                    <p>Professor McGonagall</p>
                </div>
            </div>
            <div class="lower-header">
                <div class="lower-header-profile-container">
                    <img src="./icons/profile-icon-8164738-512.png" alt="profile-pic-icon" class="lower-header-profile-icon">
                    <div class="welcome-message">
                        <p class="hello-text">Hi there, <br> <span class="username">Professor McGonagall (@minerva)</span></p>
                    </div>
                </div>
                <div class="lower-level-buttons-container">
                    <button type="button" class="lower-level-button" id="new">New</button>
                    <button type="button" class="lower-level-button" id="upload">Upload</button>
                    <button type="button" class="lower-level-button" id="share">Share</button>
                </div>
            </div>
        </div>
        <div id="sidebar">
            <h2 class="sidebar-title">Dashboard</h2>
            <div class="buttons-one">
                <div class="sidebar-button-icon">
                    <img src="./icons/home-circle.svg" alt="home-circle" class="sidebar-icon">
                    <button type="button" class="sidebar-buttons">Home</button>
                </div>
                <div class="sidebar-button-icon">
                    <img src="./icons/card-account-details-outline.svg" alt="card-account-details-outline" class="sidebar-icon">
                    <button type="button" class="sidebar-buttons">Profile</button>
                </div>
                <div class="sidebar-button-icon">
                    <img src="./icons/message-text-outline.svg" alt="message-text-outline" class="sidebar-icon">
                    <button type="button" class="sidebar-buttons">Messages</button>
                </div>
                <div class="sidebar-button-icon">
                    <img src="./icons/history.svg" alt="history-icon" class="sidebar-icon">
                    <button type="button" class="sidebar-buttons">History</button>
                </div>
                <div class="sidebar-button-icon">
                    <img src="./icons/checkbox-marked-circle-auto-outline.svg" alt="tasks-icon" class="sidebar-icon">
                    <button type="button" class="sidebar-buttons">Tasks</button>
                </div>
                <div class="sidebar-button-icon">
                    <img src="./icons/account-group-outline.svg" alt="communities-icon" class="sidebar-icon">
                    <button type="button" class="sidebar-buttons">Communities</button>
                </div>
            </div>
            <div class="buttons-two">
                <div class="sidebar-button-icon">
                    <img src="./icons/cog.svg" alt="settings-icon" class="sidebar-icon">
                    <button type="button" class="sidebar-buttons">Settings</button>
                </div>
                <div class="sidebar-button-icon">
                    <img src="./icons/face-agent.svg" alt="support-icon" class="sidebar-icon">
                    <button type="button" class="sidebar-buttons">Support</button>
                </div>
                <div class="sidebar-button-icon">
                    <img src="./icons/shield-check-outline.svg" alt="privacy-icon" class="sidebar-icon">
                    <button type="button" class="sidebar-buttons">Privacy</button>
                </div>
            </div>
        </div>
        <div id="main-content">
            <div id="projects-container">
                <h3 class="projects-title">Your Projects</h3>
                <div id="projects">
                    <div class="project-box">January</div>
                    <div class="project-box">February</div>
                    <div class="project-box">March</div>
                    <div class="project-box">April</div>
                    <div class="project-box">May</div>
                    <div class="project-box">June</div>
                </div>
            </div>
            <div id="right-side-container">
                <div id="announcements">
                    <h3 class="announcements-title">Announcements</h3>
                    <div class="right-side-box">
                        <div class="announcement">Site Maintenance</div>
                        <div class="announcement">Community Share Day</div>
                        <div class="announcement">Privacy Policy Update</div>
                    </div>
                </div>
                <div id="trending">
                    <h3 class="trending-title">Trending</h3>
                    <div class="right-side-box">
                        <div class="trending-user-profile">
                            <img src="./icons/harry-potter-icon-1425534-512.png" alt="harry-icon" class="trending-user-icon">
                            <div class="trending-user">Harry</div>
                        </div>
                        <div class="trending-user-profile">
                            <img src="./icons/ron-weasley-icon-1425547-512.png" alt="ron-icon" class="trending-user-icon">
                            <div class="trending-user">Ron</div>
                        </div>
                        <div class="trending-user-profile">
                            <img src="./icons/hermione-granger-icon-1425549-512.png" alt="hermione-icon" class="trending-user-icon">
                            <div class="trending-user">Hermione</div>
                        </div>
                        <div class="trending-user-profile">
                            <img src="./icons/quidditch-icon-2386491-512.png" alt="ginny-quidditch-icon" class="trending-user-icon">
                            <div class="trending-user">Ginny</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
